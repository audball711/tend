<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Tend{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Agu+Display&family=The+Girl+Next+Door&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="{% block page_class %}{% endblock %} {{ theme_class or 'neutral' }}">

  <div class="weather-layer" aria-hidden="true"></div>

  <header>
    <div class="header-inner">
      
      
      <div class="header-brand">
        <h2>
          Tend
          {% if town_name %}
            <span class="header-location">— {{ town_name }}</span>
          {% endif %}
        </h2>
          <p>Your garden intelligence system</p>
      </div>

      <nav>
        <a href="/">Home</a>
        <a href="/settings">Settings</a>
      </nav>
    </div>
  </header>

  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages">
          {% for message in messages %}
            <p class="flash">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
